<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeedWorld - Voxel Factorio Light MVP</title>
    <style>
      :root {
        --bg-base: #0a1210;
        --bg-mid: #13221d;
        --bg-highlight: #224437;
        --ink: #ebf9f1;
        --accent: #d4a017;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg-base);
        color: var(--ink);
        font-family: "Space Grotesk", sans-serif;
      }

      .hero {
        text-align: center;
        max-width: 600px;
        padding: 40px;
        background: var(--bg-mid);
        border-radius: 16px;
        border: 1px solid var(--bg-highlight);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }

      h1 { font-size: 48px; margin: 0; color: var(--accent); }
      p { font-size: 18px; opacity: 0.8; margin: 20px 0 40px; }

      .btn-start {
        display: inline-block;
        padding: 16px 48px;
        background: var(--accent);
        color: var(--bg-base);
        text-decoration: none;
        font-weight: bold;
        font-size: 20px;
        border-radius: 8px;
        transition: transform 0.2s, box-shadow 0.2s;
      }

      .btn-start:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(212, 160, 23, 0.3);
      }

      .features {
        margin-top: 60px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        width: 100%;
        max-width: 900px;
      }

      .feature-card {
        background: rgba(19, 34, 29, 0.5);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--bg-highlight);
        text-align: center;
      }

      .feature-icon { font-size: 32px; margin-bottom: 10px; display: block; }
      .feature-title { font-weight: bold; margin-bottom: 8px; display: block; }
      .feature-desc { font-size: 14px; opacity: 0.6; }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>SeedWorld</h1>
      <p>Voxel Factorio Light MVP</p>
      <a href="game.html" class="btn-start">Spiel starten</a>
    </div>

    <div class="features">
      <div class="feature-card">
        <span class="feature-icon">🧊</span>
        <span class="feature-title">Voxel Optik</span>
        <span class="feature-desc">Isometrische 3D-Ansicht mit Canvas + DOM Rendering.</span>
      </div>
      <div class="feature-card">
        <span class="feature-icon">⚙️</span>
        <span class="feature-title">Automatisierung</span>
        <span class="feature-desc">Baue Minen und Schmelzöfen, um Ressourcen zu verarbeiten.</span>
      </div>
      <div class="feature-card">
        <span class="feature-icon">🌱</span>
        <span class="feature-title">Deterministisch</span>
        <span class="feature-desc">Jede Welt basiert auf einem Seed und ist 100% reproduzierbar.</span>
      </div>
    </div>
  </body>
</html>
</html>
