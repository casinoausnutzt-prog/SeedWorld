<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeedWorld - Game</title>
    <link rel="stylesheet" href="./src/ui/tileGrid.css" />
    <style>
      :root {
        --bg-base: #0a1210;
        --bg-mid: #13221d;
        --bg-highlight: #224437;
        --panel: rgb(6 18 13 / 84%);
        --panel-border: rgb(161 213 190 / 38%);
        --grid-border: rgb(172 210 195 / 24%);
        --ink: #ebf9f1;
        --ink-soft: #a8cbb9;
        --line: #7affc8;
        --focus: #f8cf76;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Space Grotesk", "IBM Plex Sans", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(1150px 650px at 12% -8%, rgb(67 127 100 / 38%), transparent 62%),
          radial-gradient(980px 520px at 88% 108%, rgb(33 82 69 / 48%), transparent 58%),
          linear-gradient(165deg, var(--bg-mid), var(--bg-base) 65%);
      }

      .game-shell {
        min-height: 100vh;
        padding: 18px 18px 192px;
        display: grid;
        place-items: center;
        position: relative;
        animation: rise-in 420ms ease-out;
      }

      #tile-grid-container {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 3;
      }

      #world-container {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        opacity: 0.72;
        z-index: 1;
      }

      #world-container canvas {
        position: relative;
        z-index: 1;
        pointer-events: none;
      }

      .debug-window {
        position: fixed;
        right: 14px;
        bottom: 14px;
        width: min(352px, calc(100vw - 28px));
        border: 1px solid var(--panel-border);
        border-radius: 15px;
        background:
          linear-gradient(180deg, rgb(21 45 35 / 45%), transparent 35%),
          var(--panel);
        backdrop-filter: blur(6px);
        padding: 12px 12px 11px;
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 7%),
          0 14px 34px rgb(0 0 0 / 44%);
        animation: float-up 500ms ease-out;
      }

      .debug-window h2 {
        margin: 0;
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #a3eccb;
      }

      .hint {
        margin: 8px 0 0;
        font-size: 0.72rem;
        line-height: 1.35;
        color: var(--ink-soft);
      }

      .resource-palette {
        display: flex;
        gap: 8px;
        margin: 9px 0 8px;
        flex-wrap: wrap;
      }

      .resource-circle {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        border: 2px solid #3f6252;
        background: #112219;
        color: #effff5;
        font-weight: 800;
        font-size: 0.78rem;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 9%);
        transition:
          transform 0.14s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .resource-circle:hover {
        transform: translateY(-1px);
      }

      .resource-circle:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .resource-circle[data-type="mine"] { background: linear-gradient(170deg, #905425, #4a2c12 66%); }
      .resource-circle[data-type="factory"] { background: linear-gradient(170deg, #3f6f73, #223b3e 66%); }
      .resource-circle[data-type="storage"] { background: linear-gradient(170deg, #64487b, #30233f 66%); }
      .resource-circle[data-type="clear"] { background: linear-gradient(170deg, #30443b, #1a2722 66%); }

      .resource-circle.is-active {
        border-color: #9df8c6;
        box-shadow: 0 0 0 2px rgb(157 248 198 / 24%);
      }

      .radial-menu {
        position: absolute;
        width: 112px;
        height: 112px;
        margin-left: -56px;
        margin-top: -56px;
        border-radius: 999px;
        border: 1px solid rgb(128 194 165 / 58%);
        background: rgb(8 24 18 / 92%);
        backdrop-filter: blur(5px);
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 8%),
          0 10px 20px rgb(0 0 0 / 38%);
        z-index: 30;
      }

      .radial-option {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 34px;
        height: 34px;
        margin-left: -17px;
        margin-top: -17px;
        border-radius: 999px;
        border: 1px solid #507b68;
        color: #ecfff4;
        font-weight: 800;
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 10%);
        transform: rotate(calc(var(--a) * 1deg)) translateY(-40px) rotate(calc(var(--a) * -1deg));
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .radial-option:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .radial-option[data-type="mine"] { background: #6f411a; }
      .radial-option[data-type="storage"] { background: #4d3a62; }
      .radial-option[data-type="factory"] { background: #2e4f52; }
      .radial-option[data-type="clear"] { background: #1e2f27; }

      .radial-option.is-active {
        box-shadow: 0 0 0 2px rgb(157 248 198 / 30%);
        border-color: #9df8c6;
      }

      .debug-window dl {
        margin: 10px 0 0;
      }

      .debug-row {
        display: grid;
        gap: 4px;
        margin-top: 9px;
        padding: 6px 8px;
        border-radius: 10px;
        background: rgb(4 12 9 / 50%);
        border: 1px solid rgb(161 213 190 / 22%);
      }

      .debug-row dt {
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .debug-row dd {
        margin: 0;
        font-family: ui-monospace, "Cascadia Code", "IBM Plex Mono", monospace;
        font-size: 0.73rem;
        line-height: 1.3;
        max-height: 88px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        color: #d8fbe8;
      }

      .connection-layer {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        overflow: visible;
      }

      .connection-line {
        stroke: var(--line);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dasharray: 12 8;
        filter: drop-shadow(0 0 5px rgb(98 255 196 / 70%));
      }

      @keyframes rise-in {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes float-up {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 720px) {
        .game-shell {
          padding: 12px 10px 244px;
        }

        .debug-window {
          right: 8px;
          left: 8px;
          bottom: 8px;
          width: auto;
        }

        .hint {
          font-size: 0.7rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .game-shell,
        .debug-window {
          animation: none;
        }

        .resource-circle,
        .tile {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="game-shell" aria-label="SeedWorld Spielansicht">
      <div id="world-container"></div>
      <div id="tile-grid-container"></div>
    </main>

    <script type="module" src="./src/main.js?rev=20260328b"></script>
    <script type="module">
      import { IsometricWorldGen } from "./src/SeedWorld_WorldGen.mjs?rev=20260328b";
      import { installRadialBuildController } from "./src/plugins/radialBuildController.js?rev=20260328b";

      async function waitForUi(timeoutMs = 2500) {
        const started = performance.now();
        return new Promise((resolve) => {
          const tick = () => {
            if (window.seedWorldUI) {
              resolve(window.seedWorldUI);
              return;
            }
            if (performance.now() - started > timeoutMs) {
              resolve(null);
              return;
            }
            window.setTimeout(tick, 25);
          };
          tick();
        });
      }

      async function renderWorldTerrain({ viewportManager = null, renderManager = null } = {}) {
        const worldContainer = document.getElementById("world-container");
        if (!worldContainer) {
          return;
        }

        const ui = await waitForUi();
        let activeWorker = null;
        let resizeTimer = null;

        const readTerrainParams = () => {
          const snapshot =
            renderManager && typeof renderManager.getSnapshot === "function"
              ? renderManager.getSnapshot()
              : null;
          const width = Number(snapshot?.gridBounds?.width) || Number(ui?.tileGridRenderer?.width) || 16;
          const height = Number(snapshot?.gridBounds?.height) || Number(ui?.tileGridRenderer?.height) || 12;
          const tileSize = Number(snapshot?.tileSize) || Number(ui?.tileGridRenderer?.tileSize) || 84;
          const worldSeed =
            typeof ui?.currentState?.world?.seed === "string" && ui.currentState.world.seed.trim()
              ? ui.currentState.world.seed.trim()
              : Date.now();

          return {
            width,
            height,
            tileSize,
            options: {
              biome: "mountain",
              scale: 0.1,
              octaves: 5,
              seed: worldSeed
            }
          };
        };

        const mountBitmap = (bitmap) => {
          const canvas = document.createElement("canvas");
          canvas.width = bitmap.width;
          canvas.height = bitmap.height;
          canvas.style.width = `${bitmap.width}px`;
          canvas.style.height = `${bitmap.height}px`;
          canvas.style.maxWidth = "100%";
          canvas.style.maxHeight = "100%";
          canvas.style.imageRendering = "crisp-edges";
          const ctx = canvas.getContext("2d");
          if (ctx) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bitmap, 0, 0);
          }
          worldContainer.replaceChildren(canvas);
        };

        const renderOnce = () => {
          const { width, height, tileSize, options } = readTerrainParams();

          if (activeWorker) {
            activeWorker.terminate();
            activeWorker = null;
          }

          if (typeof Worker === "function" && typeof OffscreenCanvas === "function") {
            const worker = new Worker("./src/workers/worldRenderWorker.js?rev=20260328b", { type: "module" });
            activeWorker = worker;
            worker.onmessage = (event) => {
              const message = event?.data || {};
              if (message.type === "world-ready" && message.bitmap) {
                mountBitmap(message.bitmap);
                worker.terminate();
                if (activeWorker === worker) {
                  activeWorker = null;
                }
                return;
              }
              if (message.type === "world-error") {
                worker.terminate();
                if (activeWorker === worker) {
                  activeWorker = null;
                }
                const fallbackGen = new IsometricWorldGen(width, height, options);
                worldContainer.replaceChildren(fallbackGen.render());
              }
            };
            worker.postMessage({ type: "render-world", width, height, tileSize, options });
            return;
          }

          const fallbackGen = new IsometricWorldGen(width, height, options);
          worldContainer.replaceChildren(fallbackGen.render());
        };

        renderOnce();

        const resizeSource =
          renderManager && typeof renderManager.subscribe === "function" ? renderManager : viewportManager;

        if (resizeSource && typeof resizeSource.subscribe === "function") {
          resizeSource.subscribe(
            () => {
              if (resizeTimer) {
                window.clearTimeout(resizeTimer);
              }
              resizeTimer = window.setTimeout(() => {
                resizeTimer = null;
                renderOnce();
              }, 120);
            },
            { immediate: false }
          );
        }
      }

      const viewportManager = window.seedWorldViewportManager || null;
      const renderManager = window.seedWorldRenderManager || null;

      await renderWorldTerrain({ viewportManager, renderManager });
      installRadialBuildController({ viewportManager, renderManager });
    </script>
  </body>
</html>
