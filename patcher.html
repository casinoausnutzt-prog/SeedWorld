<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeedWorld - Patcher UI</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body class="patcher-mode-active">
    <div id="app">
        <header class="app-header">
            <div class="header-left">
                <h1>SeedWorld</h1>
                <span class="mode-indicator">PATCHER MODE</span>
            </div>
            <div class="header-right">
                <button id="openGame" class="mode-toggle">
                    <span class="toggle-text">Open Game UI</span>
                </button>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot offline"></span>
                    <span class="status-text">Offline</span>
                </div>
            </div>
        </header>

        <main id="patcherMode" class="mode-content patcher-mode"></main>
    </div>

    <script type="module">
        import { PatcherUIController } from './src/ui/PatcherUIController.js';

        const patcherMode = document.getElementById('patcherMode');
        const openGame = document.getElementById('openGame');
        const statusElement = document.getElementById('connectionStatus');
        const statusDot = statusElement.querySelector('.status-dot');
        const statusText = statusElement.querySelector('.status-text');

        openGame.addEventListener('click', () => {
            window.location.href = './index.html';
        });

        function initializeWebSocket() {
            const ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                statusDot.classList.remove('offline');
                statusDot.classList.add('online');
                statusText.textContent = 'Connected';
            };

            ws.onclose = () => {
                statusDot.classList.remove('online');
                statusDot.classList.add('offline');
                statusText.textContent = 'Offline';
            };

            ws.onerror = () => {
                statusDot.classList.remove('online');
                statusDot.classList.add('offline');
                statusText.textContent = 'Offline';
            };
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initializeWebSocket();
            const patcherUIController = new PatcherUIController();
            await patcherUIController.initialize(patcherMode);
            await patcherUIController.refreshPatches();
        });
    </script>
</body>
</html>
