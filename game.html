<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeedWorld - Pixel Basin</title>
    <link rel="stylesheet" href="./src/ui/tileGrid.css" />
    <style>
      :root {
        --bg: #0f1413;
        --panel: #18211f;
        --panel-soft: #1e2b28;
        --ink: #edf6ef;
        --ink-soft: #b3c6bb;
        --accent: #f2a93b;
        --accent-2: #85d4b1;
        --line: #2c3b36;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, #22312d 0%, transparent 36%),
          radial-gradient(circle at bottom right, #182320 0%, transparent 28%),
          var(--bg);
        color: var(--ink);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
        background: rgb(12 17 16 / 92%);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(6px);
      }

      .topbar__nav {
        display: flex;
        gap: 8px;
      }

      .nav-button {
        border: 1px solid #42524c;
        background: #1a2522;
        color: var(--ink);
        border-radius: 999px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 700;
      }

      .resource-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .resource-chip {
        min-width: 84px;
        padding: 8px 10px;
        border: 1px solid #334540;
        border-radius: 12px;
        background: linear-gradient(180deg, #22302d, #18211f);
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 5%);
      }

      .resource-chip__label {
        display: block;
        font-size: 0.66rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .resource-chip__value {
        display: block;
        margin-top: 2px;
        font-size: 1rem;
        color: var(--ink);
      }

      .game-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 16px;
        padding: 16px;
      }

      .map-panel,
      .side-panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(180deg, rgb(26 35 33 / 96%), rgb(20 28 26 / 96%));
        box-shadow: 0 18px 30px rgb(0 0 0 / 22%);
      }

      .map-panel {
        padding: 18px;
        display: grid;
        place-items: center;
        min-height: calc(100vh - 130px);
      }

      .side-panel {
        padding: 16px;
        display: grid;
        align-content: start;
        gap: 14px;
      }

      .panel-title {
        margin: 0;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .panel-block {
        padding: 12px;
        border-radius: 14px;
        border: 1px solid #31423c;
        background: var(--panel-soft);
      }

      .panel-copy {
        margin: 6px 0 0;
        font-size: 0.92rem;
        line-height: 1.45;
      }

      .build-actions {
        display: grid;
        gap: 8px;
      }

      .build-actions__title,
      .build-actions__hint,
      .build-actions__note {
        margin: 0;
        font-size: 0.85rem;
        line-height: 1.4;
      }

      .build-actions__title {
        font-weight: 700;
        color: var(--accent);
      }

      .build-action-button {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        width: 100%;
        border: 1px solid #45574f;
        border-radius: 12px;
        background: #22302d;
        color: var(--ink);
        padding: 10px 12px;
        cursor: pointer;
      }

      .build-action-button strong {
        font-size: 0.95rem;
      }

      .build-action-button span {
        color: var(--accent-2);
        font-size: 0.8rem;
        text-transform: uppercase;
      }

      .build-action-button:disabled {
        opacity: 0.46;
        cursor: not-allowed;
      }

      .state-dump {
        margin: 0;
        max-height: 220px;
        overflow: auto;
        font-size: 0.74rem;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 1024px) {
        .game-layout {
          grid-template-columns: 1fr;
        }

        .map-panel {
          min-height: auto;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__nav">
        <button id="nav-home" class="nav-button" type="button">← Startmenue</button>
        <button id="nav-patcher" class="nav-button" type="button">🔧 Zum Patcher</button>
      </div>
      <div id="resource-bar" class="resource-bar" aria-label="Ressourcenleiste"></div>
    </header>

    <main class="game-layout">
      <section class="map-panel" aria-label="Spielkarte">
        <div id="tile-grid-container"></div>
      </section>

      <aside class="side-panel" aria-live="polite">
        <section class="panel-block">
          <h2 class="panel-title">Status</h2>
          <p id="status-value" class="panel-copy">-</p>
          <p id="summary-value" class="panel-copy">-</p>
        </section>

        <section class="panel-block">
          <h2 class="panel-title">Auswahl</h2>
          <p id="selection-value" class="panel-copy">Kein Feld ausgewaehlt</p>
        </section>

        <section class="panel-block">
          <h2 class="panel-title">Bauen</h2>
          <div id="build-actions" class="build-actions"></div>
        </section>

        <section class="panel-block">
          <h2 class="panel-title">State</h2>
          <pre id="state-value" class="state-dump">-</pre>
        </section>
      </aside>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
