name: Required Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  reproduced-kernel-testline:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap signing verification key
        run: |
          gpg --batch --keyserver keyserver.ubuntu.com --recv-keys F14A6FC849CF906ED7518584D7EA78B1F7778AFD
          gpg --batch --list-keys F14A6FC849CF906ED7518584D7EA78B1F7778AFD

      - name: Prove deterministic reproduction (verify-only)
        run: npm run check:required:verify-only

      - name: Upload required-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-proof-artifacts
          path: |
            runtime/evidence/required-check-report.json
            runtime/evidence/governance-findings.json
            runtime/evidence/governance-proof-manifest.json
            runtime/evidence/governance-coverage.json
            runtime/evidence/summary.json
            runtime/evidence/final/testline-summary.json
